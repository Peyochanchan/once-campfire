default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 10 } %>

development:
  primary:
    <<: *default
    database: campfire_development

test:
  primary:
    <<: *default
    database: campfire_test

production:
  primary:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
