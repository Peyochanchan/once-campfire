test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage", "files") %>

hetzner:
  service: S3
  access_key_id: <%= ENV["S3_ACCESS_KEY_ID"] %>
  secret_access_key: <%= ENV["S3_SECRET_ACCESS_KEY"] %>
  region: <%= ENV.fetch("S3_REGION", "hel1") %>
  bucket: <%= ENV.fetch("S3_BUCKET", "infra-acme") %>
  endpoint: <%= ENV.fetch("S3_ENDPOINT", "https://hel1.your-objectstorage.com") %>
  force_path_style: true
